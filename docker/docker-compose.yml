services:
  web:
    build: ./web
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      PORT: "${PORT:-3000}"
      DEFENSE_LEVEL: "${DEFENSE_LEVEL:-0}"

      LAYER1_ENABLED: "${LAYER1_ENABLED:-}"
      LAYER2_ENABLED: "${LAYER2_ENABLED:-}"
      LAYER3_ENABLED: "${LAYER3_ENABLED:-}"
      LAYER4_ENABLED: "${LAYER4_ENABLED:-}"

      ENABLE_ESCAPE: "${ENABLE_ESCAPE:-}"
      ENABLE_ALLOWLIST: "${ENABLE_ALLOWLIST:-}"
      ENABLE_CONTEXT_ENCODING: "${ENABLE_CONTEXT_ENCODING:-}"
      ENABLE_TEMPLATE_AUTO_ESCAPE: "${ENABLE_TEMPLATE_AUTO_ESCAPE:-}"
      ENABLE_DOM_SANITIZER: "${ENABLE_DOM_SANITIZER:-}"
      ENABLE_TEXT_RENDER: "${ENABLE_TEXT_RENDER:-}"

      ENABLE_CSP: "${ENABLE_CSP:-}"
      CSP_MODE: "${CSP_MODE:-}"
      ENABLE_DOM_DEFENSE: "${ENABLE_DOM_DEFENSE:-}"
      ENABLE_TRUSTED_TYPES: "${ENABLE_TRUSTED_TYPES:-}"
      ENABLE_CROSS_ORIGIN_ISOLATION: "${ENABLE_CROSS_ORIGIN_ISOLATION:-}"

      ENABLE_ORIGIN_CHECK: "${ENABLE_ORIGIN_CHECK:-}"
      COOKIE_HTTPONLY: "${COOKIE_HTTPONLY:-}"
      COOKIE_SECURE: "${COOKIE_SECURE:-}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-}"

      ENABLE_AVOID_INNERHTML: "${ENABLE_AVOID_INNERHTML:-}"
      ENABLE_SECURITY_HEADERS: "${ENABLE_SECURITY_HEADERS:-}"
